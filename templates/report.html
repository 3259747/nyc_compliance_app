<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoning Compliance Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-sm p-8 border border-slate-100 mb-8 flex justify-between items-center">
            <div>
                <span class="text-xs font-bold tracking-wider text-indigo-600 uppercase bg-indigo-50 px-3 py-1 rounded-full">NYC AI Compliance Engine</span>
                <h1 class="text-3xl font-bold text-slate-900 mt-2">Zoning Parameter Details</h1>
                <p class="text-slate-500 mt-1">File Analyzed: <span class="font-semibold text-slate-700">{{ filename }}</span></p>
            </div>
            <button onclick="window.print()" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl font-medium text-sm shadow-sm transition-colors flex items-center gap-2">
                Export Audit Report (PDF)
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-bottom border-slate-100 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        <th class="padding: 16px; p-4 pl-6">Zoning Parameter</th>
                        <th class="padding: 16px; p-4">Legal Reference Threshold</th>
                        <th class="padding: 16px; p-4 pr-6">AI Evaluation Status & Legal Section Reference</th>
                    </tr>
                </thead>
                <tbody>
                    {{ ai_rows | safe }}
                </tbody>
            </table>
        </div>

        <div class="mt-6 text-center">
            <a href="/workspace" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700 transition-colors">← Upload Another Proposal Document</a>
        </div>
    </div>

</body>
</html>
